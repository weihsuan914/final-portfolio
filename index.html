/* ═══════════════════════════════════════════
   ANIMATED BACKGROUND GRID
═══════════════════════════════════════════ */
(function initGrid() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, t = 0;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  function draw() {
    ctx.clearRect(0, 0, W, H);
    const gridSize = 44;
    t += 0.004;

    // ── 1. 3 個獨立光源，各自在格線上緩慢遊走 ──
    const lights = [
      { x: (Math.sin(t * 0.31)         * 0.38 + 0.5) * W,
        y: (Math.cos(t * 0.22)         * 0.38 + 0.5) * H },
      { x: (Math.sin(t * 0.19 + 2.1)  * 0.38 + 0.5) * W,
        y: (Math.cos(t * 0.27 + 1.3)  * 0.38 + 0.5) * H },
      { x: (Math.sin(t * 0.25 + 4.2)  * 0.38 + 0.5) * W,
        y: (Math.cos(t * 0.17 + 3.7)  * 0.38 + 0.5) * H },
    ];
    const RADIUS = Math.max(W, H) * 0.38; // 擴散半徑
    const PEAK   = 0.13;                  // 最亮點透明度上限（弱化對比）

    // ── 2. 計算每個交叉點亮度（多光源疊加，取最大值） ──
    const cols = Math.ceil(W / gridSize) + 2;
    const rows = Math.ceil(H / gridSize) + 2;
    const bright = [];
    for (let ci = 0; ci < cols; ci++) {
      bright[ci] = [];
      for (let ri = 0; ri < rows; ri++) {
        const px = ci * gridSize;
        const py = ri * gridSize;
        let val = 0;
        for (const l of lights) {
          const dist = Math.hypot(px - l.x, py - l.y);
          const contribution = Math.max(0, 1 - dist / RADIUS);
          val = Math.max(val, contribution * contribution); // 平方讓邊緣更柔
        }
        bright[ci][ri] = val;
      }
    }

    // ── 3. 畫線段：用兩端點亮度平均，再平方壓暗低亮區 ──
    for (let ci = 0; ci < cols; ci++) {
      for (let ri = 0; ri < rows - 1; ri++) {
        const avg = (bright[ci][ri] + bright[ci][ri + 1]) * 0.5;
        const alpha = avg * avg * PEAK;
        if (alpha < 0.003) continue;
        ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(ci * gridSize, ri * gridSize);
        ctx.lineTo(ci * gridSize, (ri + 1) * gridSize);
        ctx.stroke();
      }
    }
    for (let ri = 0; ri < rows; ri++) {
      for (let ci = 0; ci < cols - 1; ci++) {
        const avg = (bright[ci][ri] + bright[ci + 1][ri]) * 0.5;
        const alpha = avg * avg * PEAK;
        if (alpha < 0.003) continue;
        ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(ci * gridSize, ri * gridSize);
        ctx.lineTo((ci + 1) * gridSize, ri * gridSize);
        ctx.stroke();
      }
    }

    // ── 4. 畫交叉點（比線稍亮） ──
    for (let ci = 0; ci < cols; ci++) {
      for (let ri = 0; ri < rows; ri++) {
        const v = bright[ci][ri];
        const alpha = v * v * PEAK * 2.2;
        if (alpha < 0.006) continue;
        const size = 0.8 + v * 1.4;
        ctx.fillStyle = `rgba(255,255,255,${alpha})`;
        ctx.fillRect(ci * gridSize - size / 2, ri * gridSize - size / 2, size, size);
      }
    }

    requestAnimationFrame(draw);
  }
  draw();
})();

/* ═══════════════════════════════════════════
   NAV
═══════════════════════════════════════════ */
const nav        = document.getElementById('nav');
const navToggle  = document.getElementById('nav-toggle');
const navLinks   = document.querySelectorAll('.nav-link');
const pageStamp  = document.getElementById('page-stamp');

let currentPage = 'about';
let prevPage    = null;

navToggle.addEventListener('click', () => {
  const exp = nav.classList.toggle('expanded');
  navToggle.setAttribute('aria-expanded', exp);
});

// Close nav on outside click (mobile)
document.addEventListener('click', (e) => {
  if (!nav.contains(e.target) && nav.classList.contains('expanded')) {
    nav.classList.remove('expanded');
    navToggle.setAttribute('aria-expanded', 'false');
  }
});

function goToPage(name) {
  if (name === currentPage && name !== 'detail') return;
  prevPage = currentPage;
  currentPage = name;

  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  navLinks.forEach(l => {
    l.classList.remove('active');
    l.removeAttribute('aria-current');
  });

  const targetPage = document.getElementById(`page-${name}`);
  if (targetPage) targetPage.classList.add('active');

  const targetNav = document.querySelector(`.nav-link[data-page="${name}"]`);
  if (targetNav) {
    targetNav.classList.add('active');
    targetNav.setAttribute('aria-current', 'page');
  }

  const stamps = { about:'SYS/01 — ABOUT', overview:'SYS/02 — OVERVIEW', showcase:'SYS/03 — SHOWCASE', detail:'SYS/03.5 — DETAIL' };
  pageStamp.textContent = stamps[name] || 'SYS/00 — PORTFOLIO';
}

navLinks.forEach(link => {
  link.addEventListener('click', () => {
    goToPage(link.dataset.page);
    if (window.innerWidth < 768) {
      nav.classList.remove('expanded');
      navToggle.setAttribute('aria-expanded', 'false');
    }
  });
});

/* ═══════════════════════════════════════════
   WORK GRID
═══════════════════════════════════════════ */
/* ── media helper ── */
function isVideo(src) { return /\.(mp4|mov|webm|ogg)$/i.test(src); }
function isYouTube(src) { return /youtube\.com\/embed\//.test(src); }

// forDetail=true → no muted (allow sound); false → muted (thumb/carousel preview)
function mediaEl(src, alt, extraClass = '', forDetail = false) {
  if (!src) return '';
  if (isYouTube(src)) {
    if (forDetail) {
      // 詳細頁：完整嵌入，開放聲音與控制列
      return `<iframe class="yt-embed" src="${src}?autoplay=1&rel=0&modestbranding=1&origin=${encodeURIComponent(location.origin)}" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
    } else {
      // 縮圖 / 輪播：顯示 YouTube 靜態預覽圖
      const videoId = src.split('/embed/')[1].split('?')[0];
      return `<img class="${extraClass}" src="https://img.youtube.com/vi/${videoId}/mqdefault.jpg" alt="${alt}">`;
    }
  }
  if (isVideo(src)) {
    const mutedAttr = forDetail ? '' : 'muted';
    return `<video class="${extraClass}" src="${src}" autoplay ${mutedAttr} loop playsinline preload="metadata"></video>`;
  }
  return `<img class="${extraClass}" src="${src}" alt="${alt}">`;
}

/* mute state (shared across all detail videos) */
let detailMuted = true; // start muted, user can unmute

const ICON_MUTED = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
  <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
  <line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>
</svg>`;
const ICON_SOUND = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
  <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
  <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
</svg>`;

function updateMuteBtn() {
  const btn = document.getElementById('detail-mute');
  if (!btn) return;
  btn.innerHTML = detailMuted ? ICON_MUTED : ICON_SOUND;
  btn.setAttribute('aria-label', detailMuted ? '取消靜音' : '靜音');
  // apply to all videos currently in detail-slides
  document.querySelectorAll('#detail-slides video').forEach(v => { v.muted = detailMuted; });
}

document.getElementById('detail-mute').addEventListener('click', () => {
  detailMuted = !detailMuted;
  updateMuteBtn();
});

function buildGrid(cat = 'all') {
  const grid = document.getElementById('work-grid');
  grid.innerHTML = '';
  const filtered = cat === 'all' ? WORKS : WORKS.filter(w => w.cat === cat);
  filtered.forEach(work => {
    const item = document.createElement('div');
    item.className = 'work-thumb';
    item.setAttribute('role', 'listitem');
    item.setAttribute('aria-label', work.title);
    item.tabIndex = 0;
    const thumbSrc = work.images[0];
    const thumbMedia = thumbSrc
      ? mediaEl(thumbSrc, work.title, 'work-thumb-img')
      : `<div class="img-ph" style="background:${work.colors[0]}"><span>${work.title}</span></div>`;
    item.innerHTML = `
      <div class="work-thumb-corner"></div>
      ${thumbMedia}
      <div class="work-thumb-overlay">
        <div class="work-thumb-title">${work.title}</div>
        <div class="work-thumb-cat">${work.cat === 'illustration' ? '插圖' : work.cat === '3d' ? '3D' : '影像'}</div>
      </div>
    `;
    item.addEventListener('click', () => openDetail(work.id));
    item.addEventListener('keydown', e => { if (e.key === 'Enter') openDetail(work.id); });
    grid.appendChild(item);
  });
}
buildGrid();

document.querySelectorAll('.filter-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.filter-tab').forEach(t => {
      t.classList.remove('active');
      t.setAttribute('aria-selected', 'false');
    });
    tab.classList.add('active');
    tab.setAttribute('aria-selected', 'true');
    buildGrid(tab.dataset.cat);
  });
});

/* ═══════════════════════════════════════════
   CAROUSEL
═══════════════════════════════════════════ */
const carTrack   = document.getElementById('carousel-track');
const carDots    = document.getElementById('carousel-dots');
const carPrev    = document.getElementById('car-prev');
const carNext    = document.getElementById('car-next');
const carProg    = document.getElementById('carousel-progress');

let carIdx       = 0;
let carTimer     = null;
let carProgTimer = null;
const CAR_DELAY  = 4500;

function buildCarousel() {
  carTrack.innerHTML = '';
  carDots.innerHTML  = '';
  WORKS.forEach((work, i) => {
    const slide = document.createElement('div');
    slide.className = 'carousel-slide';
    const slideSrc = work.images[0];
    const slideMedia = slideSrc
      ? mediaEl(slideSrc, work.title)
      : `<div class="img-ph" style="background:${work.colors[0]};height:100%"><span>${work.title}</span></div>`;
    slide.innerHTML = `
      ${slideMedia}
      <div class="carousel-slide-info">
        <div class="slide-cat">${work.cat === 'illustration' ? '插圖' : work.cat === '3d' ? '3D' : '影像'}</div>
        <div class="slide-title">${work.title}</div>
      </div>
    `;
    slide.addEventListener('click', () => openDetail(work.id));
    carTrack.appendChild(slide);

    const dot = document.createElement('div');
    dot.className = 'carousel-dot' + (i === 0 ? ' active' : '');
    dot.addEventListener('click', () => carGoTo(i));
    carDots.appendChild(dot);
  });
}

function carGoTo(idx) {
  carIdx = (idx + WORKS.length) % WORKS.length;
  carTrack.style.transform = `translateX(-${carIdx * 100}%)`;
  document.querySelectorAll('.carousel-dot').forEach((d, i) => d.classList.toggle('active', i === carIdx));
  updateShowcaseInfo(carIdx);
  resetCarProgress();
}

function updateShowcaseInfo(idx) {
  const work = WORKS[idx];
  if (!work) return;

  document.getElementById('si-cat').textContent =
    work.cat === 'illustration' ? '插圖' : work.cat === '3d' ? '3D' : '影像';
  document.getElementById('si-title').textContent = work.title;

  // 從 overview content 擷取 meta-row HTML
  const raw = work.info.overview.content;
  const tmp = document.createElement('div');
  tmp.innerHTML = raw;
  const rows = tmp.querySelectorAll('.meta-row');
  const metaEl = document.getElementById('si-meta');
  metaEl.innerHTML = '';
  rows.forEach(r => {
    const clone = r.cloneNode(true);
    metaEl.appendChild(clone);
  });

  document.getElementById('si-cta').onclick = () => openDetail(work.id);
}

function resetCarProgress() {
  clearTimeout(carTimer);
  clearTimeout(carProgTimer);
  carProg.style.transition = 'none';
  carProg.style.width = '0%';
  requestAnimationFrame(() => {
    carProg.style.transition = `width ${CAR_DELAY}ms linear`;
    carProg.style.width = '100%';
  });
  carTimer = setTimeout(() => carGoTo(carIdx + 1), CAR_DELAY);
}

carPrev.addEventListener('click', () => carGoTo(carIdx - 1));
carNext.addEventListener('click', () => carGoTo(carIdx + 1));
document.addEventListener('visibilitychange', () => {
  if (document.hidden) { clearTimeout(carTimer); } else { resetCarProgress(); }
});

buildCarousel();
updateShowcaseInfo(0);
resetCarProgress();

/* ═══════════════════════════════════════════
   DETAIL PAGE
═══════════════════════════════════════════ */
let detailWork    = null;
let detailSlideIdx = 0;
let panelIdx      = 0;

function openDetail(id) {
  detailWork = WORKS.find(w => w.id === id);
  if (!detailWork) return;
  detailSlideIdx = 0;
  panelIdx = 0;

  // Build media slides
  const slidesEl = document.getElementById('detail-slides');
  slidesEl.innerHTML = '';
  let hasVideo = false;
  detailWork.images.forEach((img, i) => {
    const s = document.createElement('div');
    s.className = 'detail-slide' + (i === 0 ? ' active' : '');
    if (img && (isVideo(img) || isYouTube(img))) hasVideo = true;
    s.innerHTML = img
      ? mediaEl(img, detailWork.labels[i] || detailWork.title, '', true)
      : `<div class="img-ph" style="background:${detailWork.colors[i] || detailWork.colors[0]};height:100%"><span>${detailWork.labels[i] || detailWork.title}</span></div>`;
    slidesEl.appendChild(s);
  });

  // show mute btn only when work has video; reset to muted each time
  const muteBtn = document.getElementById('detail-mute');
  muteBtn.style.display = hasVideo ? 'flex' : 'none';
  detailMuted = true;
  updateMuteBtn();

  updateDetailCounter();

  // Build text tabs & panels
  const tabsEl   = document.getElementById('detail-tabs');
  const panelsEl = document.getElementById('detail-panels');
  tabsEl.innerHTML   = '';
  panelsEl.innerHTML = '';

  PANEL_ORDER.forEach((key, i) => {
    const info = detailWork.info[key];
    const tab = document.createElement('button');
    tab.className = 'detail-tab' + (i === 0 ? ' active' : '');
    tab.textContent = info.title;
    tab.setAttribute('role', 'tab');
    tab.setAttribute('aria-selected', i === 0 ? 'true' : 'false');
    tab.addEventListener('click', () => switchPanel(i));
    tabsEl.appendChild(tab);

    const panel = document.createElement('div');
    panel.className = 'detail-panel' + (i === 0 ? ' active' : '');
    panel.setAttribute('role', 'tabpanel');
    panel.innerHTML = `<h4>${info.title}</h4><p>${info.content}</p>`;
    panelsEl.appendChild(panel);
  });

  updatePanelNav();
  goToPage('detail');
}

function updateDetailCounter() {
  const c = document.getElementById('detail-counter');
  const slides = document.querySelectorAll('#detail-slides .detail-slide');
  c.textContent = `${detailSlideIdx + 1} / ${slides.length}`;
}

function switchDetailSlide(dir) {
  const slides = document.querySelectorAll('#detail-slides .detail-slide');
  slides[detailSlideIdx].classList.remove('active');
  detailSlideIdx = (detailSlideIdx + dir + slides.length) % slides.length;
  slides[detailSlideIdx].classList.add('active');
  updateDetailCounter();
}

document.getElementById('detail-prev').addEventListener('click', () => switchDetailSlide(-1));
document.getElementById('detail-next').addEventListener('click', () => switchDetailSlide(1));

function switchPanel(idx) {
  panelIdx = idx;
  document.querySelectorAll('.detail-tab').forEach((t, i) => {
    t.classList.toggle('active', i === idx);
    t.setAttribute('aria-selected', i === idx ? 'true' : 'false');
  });
  document.querySelectorAll('.detail-panel').forEach((p, i) => p.classList.toggle('active', i === idx));
  updatePanelNav();
}

function updatePanelNav() {
  document.getElementById('panel-prev-btn').disabled = panelIdx === 0;
  document.getElementById('panel-next-btn').disabled = panelIdx === PANEL_ORDER.length - 1;
  document.getElementById('panel-pos').textContent = `${panelIdx + 1} / ${PANEL_ORDER.length}`;
}

document.getElementById('panel-prev-btn').addEventListener('click', () => { if (panelIdx > 0) switchPanel(panelIdx - 1); });
document.getElementById('panel-next-btn').addEventListener('click', () => { if (panelIdx < PANEL_ORDER.length - 1) switchPanel(panelIdx + 1); });

// Back button
const detailBack = document.getElementById('detail-back');
detailBack.addEventListener('click', () => { goToPage(prevPage || 'overview'); });
detailBack.addEventListener('keydown', e => { if (e.key === 'Enter') goToPage(prevPage || 'overview'); });
</script>
